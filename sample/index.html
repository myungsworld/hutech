<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HuTech - 샘플 데모</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
      background: #f7f7f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .hub {
      max-width: 640px;
      width: 100%;
      padding: 20px;
    }
    .hub-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .hub-logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 800;
      color: #1a1a1a;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }
    .hub-logo .logo-icon {
      width: 36px;
      height: 36px;
      background: #f5a623;
      color: #fff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .hub-desc {
      font-size: 14px;
      color: #999;
    }
    .demo-cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .demo-card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 16px;
      padding: 28px 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .demo-card:hover {
      border-color: #f5a623;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      transform: translateY(-2px);
    }
    .demo-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }
    .demo-icon.doc { background: #fff8ed; color: #f5a623; }
    .demo-icon.match { background: #e8f0fe; color: #4285f4; }
    .demo-info { flex: 1; }
    .demo-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .demo-subtitle {
      font-size: 13px;
      color: #999;
      line-height: 1.5;
    }
    .demo-arrow {
      color: #bbb;
      font-size: 18px;
      flex-shrink: 0;
    }
    .demo-card:hover .demo-arrow { color: #f5a623; }
    .demo-tags {
      display: flex;
      gap: 4px;
      margin-top: 8px;
    }
    .demo-tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #f7f7f8;
      color: #666;
      border: 1px solid #e8e8e8;
    }
  </style>
</head>
<body>
  <div class="hub">
    <div class="hub-header">
      <div class="hub-logo">
        <span class="logo-icon"><i class="bi bi-grid-3x3-gap-fill"></i></span>
        HuTech
      </div>
      <p class="hub-desc">샘플 데모</p>
    </div>

    <div class="demo-cards">
      <a href="auto-document.html" class="demo-card">
        <div class="demo-icon doc"><i class="bi bi-file-earmark-text"></i></div>
        <div class="demo-info">
          <div class="demo-title">AI 문서 작성</div>
          <div class="demo-subtitle">업로드 → AI 생성 & 비교 → 에디팅 → AI 평가 → 출력</div>
          <div class="demo-tags">
            <span class="demo-tag">멀티 AI 비교</span>
            <span class="demo-tag">리치 에디터</span>
            <span class="demo-tag">AI 품질 평가</span>
          </div>
        </div>
        <span class="demo-arrow"><i class="bi bi-chevron-right"></i></span>
      </a>

      <a href="matching.html" class="demo-card">
        <div class="demo-icon match"><i class="bi bi-people"></i></div>
        <div class="demo-info">
          <div class="demo-title">AI 전문가 매칭</div>
          <div class="demo-subtitle">의뢰 등록 → AI 분석 → 전문가 매칭 → 매칭 확정</div>
          <div class="demo-tags">
            <span class="demo-tag">AI 분석</span>
            <span class="demo-tag">적합도 점수</span>
            <span class="demo-tag">자동 매칭</span>
          </div>
        </div>
        <span class="demo-arrow"><i class="bi bi-chevron-right"></i></span>
      </a>
    </div>
  </div>
</body>
</html>
